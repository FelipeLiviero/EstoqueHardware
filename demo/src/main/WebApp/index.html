<!DOCTYPE html>
<html>
<head>
  <title>EstoqueHardware</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <h1 class="mb-3">Estoque Loja</h1>

  <!-- Barra superior -->
  <nav class="navbar bg-body-tertiary">
    <div class="container-fluid">
      <a class="navbar-brand">Produtos Cadastrados</a>
      <form class="d-flex" role="search">
        <input class="form-control me-2" type="search" placeholder="Buscar produto" aria-label="Buscar produto"/>
        <button class="btn btn-outline-success" type="submit">Buscar</button>
      </form>
    </div>
  </nav>

  <!-- Botão que abre o modal -->
  <button type="button" class="btn btn-primary position-fixed bottom-0 end-0 m-3" data-bs-toggle="modal" data-bs-target="#staticBackdrop" style="height: 50px; width: 50px;">
    +
  </button>

  <!-- Modal -->
  <div class="modal fade" id="staticBackdrop" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="staticBackdropLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h1 class="modal-title fs-5" id="staticBackdropLabel">Produto</h1>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="card" style="width: 100%;">
            <img src="" class="card-img-top" alt="Imagem do produto">
            <form>
              <fieldset>
                <div class="card-body">
                  <h5 class="card-title"></h5>
                  <p class="card-text"></p>
                  <a href="#" class="btn btn-primary position-relative end-10" id="btnInserirImagem">Inserir imagem</a>
                  <input type="file" id="imagem_produto" name="imagem_produto" style="display: none;">
                </div>

                <!-- Tipo -->
                <div class="mb-3">
                  <label for="tipo_produto" class="form-label">Tipo</label>
                  <select name="tipo_produto" id="tipo_produto" class="form-select">
                    <option value="" selected disabled>Escolha o tipo do produto</option>
                    <option value="processador">Processador</option>
                    <option value="placa_video">Placa de vídeo</option>
                    <option value="memoria_ram">Memória RAM</option>
                    <option value="storage">HD / SSD / M.2</option>
                    <option value="placa_mae">Placa mãe</option>
                  </select>
                </div>

                <!-- Nome -->
                <div class="mb-3">
                  <label for="nome_produto" class="form-label">Nome</label>
                  <input type="text" id="nome_produto" name="nome_produto" class="form-control" placeholder="Digite o nome do produto">
                </div>

                <!-- Marca -->
                <div class="mb-3">
                  <label for="marca_produto" class="form-label">Marca</label>
                  <input type="text" id="marca_produto" name="marca_produto" class="form-control" placeholder="Digite a marca do produto">
                </div>

                <!-- Memória -->
                <div class="mb-3">
                  <label for="memoria_produto" class="form-label">Memória</label>
                  <input type="text" id="memoria_produto" name="memoria_produto" class="form-control" placeholder="Digite a quantidade de memória">
                </div>
              </fieldset>
            </form>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
          <form action="/cadastrar" method="post">
            <button type="submit" class="btn btn-primary">Salvar</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts do Bootstrap 5 -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Script para imagem -->
  <script>
    const btnInserirImagem = document.getElementById('btnInserirImagem');
    const inputImagem = document.getElementById('imagem_produto');
    const imgPreview = document.querySelector('.card-img-top');

    btnInserirImagem.addEventListener('click', function(e) {
      e.preventDefault();
      inputImagem.click();
    });

    inputImagem.addEventListener('change', function() {
      const file = this.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          imgPreview.src = e.target.result;
          imgPreview.alt = "Pré-visualização do produto";
        };
        reader.readAsDataURL(file);
      }
    });
  </script>
</body>
</html>
